version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - node -v
        - npm -v
        - npm ci
        - npm rebuild better-sqlite3
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=8192"
        - export NEXT_TELEMETRY_DISABLED=1
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
      - .npm/**/*
