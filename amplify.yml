version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - node -v
        - npm -v
        - npm ci --no-audit --no-fund
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=8192"
        - export NEXT_TELEMETRY_DISABLED=1
        - npm run build:aws
        - mkdir -p .next/standalone/data
        - cp -r data/* .next/standalone/data/ || true
        - cp -r public .next/standalone/public || true
        - mkdir -p .next/standalone/.next/static
        - cp -r .next/static .next/standalone/.next/static || true
        - cp -r database .next/standalone/database || true
        - |
          echo "Writing runtime environment variables..."
          env | grep -E '^(DATABASE_|DB_|GOOGLE_|NEXT_PUBLIC_|NODE_ENV|SMTP_|FINANCE_|APP_|PUBLIC_|ADMIN_|PORTAL_|YOUTUBE_)' > .next/standalone/.env.production || true
          echo "Env vars written: $(wc -l < .next/standalone/.env.production) lines"
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
cache:
  paths:
    - .npm/**/*
    - .next/cache/**/*
