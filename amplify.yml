version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - node -v
        - npm ci
        - npm rebuild better-sqlite3
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=8192"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
