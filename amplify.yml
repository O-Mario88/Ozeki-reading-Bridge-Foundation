version: 1
# =============================================================================
# AMPLIFY DEPLOYMENT INTENTIONALLY DISABLED — 2026-05-06
# =============================================================================
# The platform is being hosted elsewhere (Railway / Firebase App Hosting /
# Vercel — see git history). To stop Amplify from auto-building every push
# to main without disconnecting the GitHub integration in the AWS console,
# the build phase below short-circuits to a no-op `exit 0`.
#
# Amplify will still receive the webhook and start a build, but it'll
# finish in seconds with nothing deployed. No env vars are exported, no
# Next.js build runs, no artifacts are produced.
#
# To re-enable Amplify deployment:
#   1. Restore the original config block at the bottom of this file
#      (search for "ORIGINAL CONFIG").
#   2. Delete the no-op `build` phase below.
#   3. Restore the artifacts block.
#   4. Redeploy from the Amplify console.
# =============================================================================

frontend:
  phases:
    preBuild:
      commands:
        - echo "Amplify auto-deploy is disabled — see amplify.yml header."
        - echo "Skipping build for commit $AWS_COMMIT_ID."
    build:
      commands:
        - exit 0
  artifacts:
    baseDirectory: .
    files: []

